

<script>

/* =============================================================== */
/* NEW CODE ADDED - 11 JULY 2024 : JOEL AI OPERATING SYSTEM START */
/* =============================================================== */
const JOEL_INTEL = [
    { id: "index.html", keywords: ["home", "main", "start"], answer: "Heading to the Command Center home page.", actions: ["Go Home"] },
    { id: "about.html", keywords: ["about", "bio", "who is"], answer: "You are currently on the About Me node. Joel is an Executive TA Manager.", actions: ["Stay Here"] },
    { id: "experience.html", keywords: ["experience", "years", "work", "career"], answer: "Joel has 7+ years in IT Staffing and Talent Acquisition.", actions: ["View Experience"] },
    { id: "skills.html", keywords: ["skills", "expertise", "tech stack"], answer: "Expertise in Recruitment Operations and High-End Web Design.", actions: ["View Skills"] },
    { id: "clients.html", keywords: ["clients", "domains", "industries"], answer: "Delivered solutions for IBM, Capgemini, and Barclays.", actions: ["View Clients"] },
    { id: "services.html", keywords: ["services", "hire", "consulting"], answer: "Providing Recruitment Strategy and Premium Web Development.", actions: ["View Services"] },
    { id: "portfolio.html", keywords: ["portfolio", "projects", "web"], answer: "Explore Joel's interactive digital missions and web builds.", actions: ["View Portfolio"] },
    { id: "certifications.html", keywords: ["certifications", "certs", "certified"], answer: "View Joel's credentials in Talent Management and Web Tech.", actions: ["View Certs"] },
    { id: "education.html", keywords: ["education", "degree", "university"], answer: "Academic foundation in IT and Human Resources.", actions: ["View Education"] },
    { id: "achievements.html", keywords: ["achievements", "awards", "success"], answer: "Top Performer recognized for recruitment excellence.", actions: ["View Achievements"] },
    { id: "networking.html", keywords: ["networking", "social", "linkedin"], answer: "Connect with Joel on LinkedIn (15k+ professionals).", actions: ["View Networking"] },
    { id: "updates.html", keywords: ["updates", "insights", "blog"], answer: "Read the latest insights on AI Staffing and UI trends.", actions: ["View Updates"] },
    { id: "contact.html", keywords: ["contact", "email", "reach"], answer: "Initiate secure transmission via the contact form.", actions: ["View Contact"] }
];

let osMemory = null;
const SUGGESTIONS = ["How many years of experience?", "Show me your web portfolio", "Contact information", "Tell me about Joel"];

function openJoelOS() {
    const os = document.getElementById('joel-ai-os');
    os.style.display = 'flex';
    gsap.to(os, { opacity: 1, duration: 0.4 });
    gsap.fromTo("#os-modal", { scale: 0.9, y: 30, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.6, ease: "expo.out" });
    setTimeout(() => document.getElementById('os-main-input').focus(), 300);
    renderSuggestions();
}

function closeJoelOS() {
    const os = document.getElementById('joel-ai-os');
    gsap.to("#os-modal", { scale: 0.95, y: 20, opacity: 0, duration: 0.3 });
    gsap.to(os, { opacity: 0, duration: 0.3, delay: 0.1, onComplete: () => { os.style.display = 'none'; resetOS(); }});
}

function renderSuggestions() {
    document.getElementById('os-suggestions').innerHTML = SUGGESTIONS.map(s => `<span class="suggestion-pill" onclick="handleOSQuery('${s}')">${s}</span>`).join('');
}

function handleOSQuery(query) {
    document.getElementById('os-main-input').value = query;
    const loader = document.getElementById('os-loader'), textT = document.getElementById('os-text-target'), linksT = document.getElementById('os-action-links'), initV = document.getElementById('os-init-view'), respB = document.getElementById('os-response-block');
    initV.style.display = 'none'; respB.style.display = 'block'; textT.innerHTML = ""; linksT.innerHTML = ""; loader.style.display = 'flex';

    setTimeout(() => {
        loader.style.display = 'none';
        const q = query.toLowerCase();
        let match = JOEL_INTEL.find(n => q.includes(n.id.split('.')[0]) || n.keywords.some(k => q.includes(k)));
        
        if (match) {
            osMemory = match.id;
            gsap.to(textT, { duration: 1, text: match.answer });
            const btn = document.createElement('button');
            btn.className = "bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black px-6 py-3 rounded-xl transition uppercase tracking-widest mt-4";
            btn.innerHTML = `<i class="fa-solid fa-arrow-right mr-2"></i> ${match.actions[0]}`;
            btn.onclick = () => { window.location.href = match.id; };
            linksT.appendChild(btn);
        } else {
            gsap.to(textT, { duration: 1, text: "I couldn't find that in my database. Try asking about skills or experience." });
        }
    }, 800);
}

function resetOS() {
    document.getElementById('os-main-input').value = "";
    document.getElementById('os-response-block').style.display = 'none';
    document.getElementById('os-init-view').style.display = 'block';
}

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openJoelOS(); }
    if (e.key === 'Escape') closeJoelOS();
    if (e.key === 'Enter' && document.activeElement.id === 'os-main-input') { handleOSQuery(document.activeElement.value); }
});
/* =============================================================== */
/* NEW CODE ADDED - 11 JULY 2024 : JOEL AI OPERATING SYSTEM END */
/* =============================================================== */
</script>
