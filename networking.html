<script>
/* ==========================================
   NETWORKING PAGE RESPONSIVE OPTIMIZATION
   (Desktop Safe)
========================================== */

(function () {

    function optimizeNetworkingMobile() {

        const isMobile = window.innerWidth <= 1024;
        const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        if (isMobile) {

            /* Refresh ScrollTrigger after layout changes */
            if (typeof ScrollTrigger !== "undefined") {
                ScrollTrigger.refresh(true);
            }

            /* Disable cursor light on touch devices */
            if (isTouch) {
                const cursorLight = document.getElementById("cursor-light");

                if (cursorLight) {
                    cursorLight.style.opacity = "0";
                    cursorLight.style.pointerEvents = "none";
                }
            }

            /* Disable magnetic transforms */
            document.querySelectorAll(".social-link-magnetic").forEach((item) => {
                item.style.transform = "none";
            });

            /* Mobile CTA buttons */
            document.querySelectorAll("#social .flex-col.gap-4 a").forEach((btn) => {
                btn.style.height = "auto";
                btn.style.padding = "1.5rem";
            });

        }

    }

    window.addEventListener("load", function () {

        setTimeout(function () {

            optimizeNetworkingMobile();

        }, 400);

    });

    let networkingResizeTimer;

    window.addEventListener("resize", function () {

        clearTimeout(networkingResizeTimer);

        networkingResizeTimer = setTimeout(function () {

            optimizeNetworkingMobile();

        }, 300);

    });

    window.addEventListener("orientationchange", function () {

        setTimeout(function () {

            optimizeNetworkingMobile();

        }, 400);

    });

})();
</script>
