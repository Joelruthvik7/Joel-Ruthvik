<script>
/* ==========================================
   WEB PORTFOLIO RESPONSIVE OPTIMIZATION
   (Safe for Desktop)
========================================== */

(function () {

    function optimizePortfolioMobile() {

        if (window.innerWidth <= 1024) {

            const xpHeader = document.querySelector(".xp-header-bar");

            if (xpHeader) {
                xpHeader.style.setProperty("top", "85px");
            }

            if (typeof ScrollTrigger !== "undefined") {
                ScrollTrigger.refresh(true);
            }
        }
    }

    window.addEventListener("load", function () {

        setTimeout(function () {

            optimizePortfolioMobile();

        }, 400);

    });

    let resizeTimer;

    window.addEventListener("resize", function () {

        clearTimeout(resizeTimer);

        resizeTimer = setTimeout(function () {

            optimizePortfolioMobile();

        }, 300);

    });

    window.addEventListener("orientationchange", function () {

        setTimeout(function () {

            optimizePortfolioMobile();

        }, 400);

    });

})();
</script>
